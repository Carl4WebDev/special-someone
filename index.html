<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
text-align:center;
position:relative;
}
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-size:contain;   /* show the entire image */
background-position:center center;
background-repeat:no-repeat;

background-color:black;    /* fills empty space */
transition:background-image 1s ease-in-out;

z-index:-1;
}

#bg::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.07); /* very light overlay */
pointer-events:none;
}
.container{
max-width:700px;
padding:25px;
background:rgba(0,0,0,0.08); /* nearly transparent */
backdrop-filter:blur(3px);
border-radius:20px;
}

h1{
color:white;
font-size:clamp(32px,7vw,46px);
margin-bottom:10px;
text-shadow:
0 4px 18px rgba(0,0,0,0.9),
0 2px 8px rgba(0,0,0,0.8);
}

.subtitle{
color:white;
font-size:clamp(18px,4vw,22px);
text-shadow:0 2px 12px rgba(0,0,0,0.9);
}

.message{
margin-top:30px;
font-size:clamp(20px,5vw,26px);
color:white;
opacity:0;
transition:opacity 1s;
line-height:1.6;
text-shadow:
0 3px 15px rgba(0,0,0,0.9),
0 2px 6px rgba(0,0,0,0.8);
}

button{
background:#ff4d6d;
border:none;
color:white;
padding:15px 30px;
font-size:18px;
border-radius:40px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#ff6b88;
}


.explode-heart{
position:fixed;
font-size:22px;
pointer-events:none;
animation:explode 1s forwards;
}

@keyframes explode{
0%{
transform:translate(0,0) scale(1);
opacity:1;
}
100%{
transform:translate(var(--x),var(--y)) scale(0.2);
opacity:0;
}
}

.floating-heart{
position:absolute;
color:#ff4d6d;
animation:floatUp 6s linear infinite;
opacity:.6;
}

@keyframes floatUp{
0%{transform:translateY(100vh) scale(0.5);opacity:0}
30%{opacity:1}
100%{transform:translateY(-10vh) scale(1.3);opacity:0}
}

canvas{
margin-top:20px;
width:90vw;
max-width:350px;
height:350px;
}

</style>
</head>

<body>
  <div id="bg"></div>

<div class="container">

<h1>I'm Sorry ❤️</h1>
<div class="subtitle">I made this just for you</div>

<button id="btn">Click if you're willing to hear me</button>

<div class="message" id="message"></div>

<canvas id="flowerCanvas"></canvas>

</div>

<script>

const btn=document.getElementById("btn")
const message=document.getElementById("message")

const messages=[

"I know I hurt you… and I truly regret it.",

"I wish I could go back and choose better words.",

"I'm sorry for the moments I made you feel unimportant.",

"You deserve someone who understands your feelings better.",

"And I'm trying to become that person.",

"I'm still learning how to love someone the right way.",

"I realize now that love is not just about feelings.",

"It's about patience, respect, and care.",

"And sometimes… I failed at those things.",

"But hurting you made me realize how much you mean to me.",

"You matter more to me than my pride.",

"More than winning an argument.",

"More than being right.",

"I'm learning that loving someone means protecting their heart.",

"Not testing its limits.",

"And if I could undo the pain I caused… I would.",

"But all I can do now is be honest.",

"I'm sorry.",

"I'm truly sorry.",

"And I hope someday you can forgive me.",

"If not today… maybe someday.",

"Until then… I'll respect your feelings.",

"And give you the time you deserve.",

"Because someone as special as you deserves gentle love.",

"And I'm trying to grow into someone worthy of that.",

"No matter what happens…"

]

let index=0

const backgrounds=[
"images/image1.jpg",
"images/image2.jpg",
"images/image3.jpg",
"images/image4.jpg",
"images/image5.jpg",
"images/image6.jpg",
"images/image7.jpg",
"images/image8.jpg"
]

let bgIndex=0

btn.addEventListener("click",(e)=>{

explodeHearts(e.clientX,e.clientY)

changeBackground()

drawFlower()

if(index<messages.length){
message.innerText=messages[index]
message.style.opacity=1
index++
}else{
message.innerText="I'm grateful I met you. ❤️"
}

})

function explodeHearts(x,y){

for(let i=0;i<25;i++){

const heart=document.createElement("div")
heart.className="explode-heart"
heart.innerText="❤"

heart.style.left=x+"px"
heart.style.top=y+"px"

const angle=Math.random()*360
const distance=80+Math.random()*120

const moveX=Math.cos(angle)*distance+"px"
const moveY=Math.sin(angle)*distance+"px"

heart.style.setProperty("--x",moveX)
heart.style.setProperty("--y",moveY)

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),1000)

}

}

function changeBackground(){

document.getElementById("bg").style.backgroundImage=`url(${backgrounds[bgIndex]})`

bgIndex++

if(bgIndex>=backgrounds.length){
bgIndex=0
}

}

function drawFlower(){

const canvas=document.getElementById("flowerCanvas")
const ctx=canvas.getContext("2d")

canvas.width=350
canvas.height=350

ctx.clearRect(0,0,canvas.width,canvas.height)

const x=175
const y=150

ctx.strokeStyle="#4caf50"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(x,300)
ctx.stroke()

for(let i=0;i<8;i++){

const angle=i*(Math.PI/4)

ctx.beginPath()

ctx.fillStyle="#ff6b81"

ctx.arc(
x+Math.cos(angle)*40,
y+Math.sin(angle)*40,
30,
0,
Math.PI*2
)

ctx.fill()

}

ctx.beginPath()
ctx.fillStyle="#ffd166"
ctx.arc(x,y,25,0,Math.PI*2)
ctx.fill()

}

function createFloatingHeart(){

const heart=document.createElement("div")

heart.className="floating-heart"
heart.innerText="❤"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(16+Math.random()*20)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

setInterval(createFloatingHeart,800)

changeBackground()

</script>

</body>
</html>
